HeCBench:
  burger:
    programming_models:
      sycl:
        run_command: ("./main", "8193", "8193", "100")
        compilation_flags: ("-e", "GCC_TOOLCHAIN=/usr/", "-e", "CC=/opt/sycl/bin/clang++", "-e",
          "HIP=yes", "-e", "HIP_ARCH=gfx90a")
      sycl-nvidia:
        run_command: ("./main", "8192", "8192", "1000")
        compilation_flags: ("-e", "GCC_TOOLCHAIN=''", "-e", "CC=/opt/sycl/bin/clang++", "-e",
          "CUDA=yes", "-e", "CUDA_ARCH=sm_80")
